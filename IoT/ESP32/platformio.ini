; ==============================================================================
; IoT ESP32-S3 / PlatformIO 設定
; ==============================================================================
; [重要]
; - 本設定は IoT 第3段階（MQTT TLS + ID/パスワード認証）を前提にする。
; - パーティションは保全用の実機読出しCSVを保持しつつ、現在の検証では
;   `DEV-002` 用の最適化CSVを使用する。
;
; [厳守]
; - 対象ボードは ESP32-S3 固定。
; - 依存バージョンは固定し、再現性を確保する。
; - 認証実値（証明書、鍵、パスワード）をこのファイルへ記載しない。
;
; [推奨]
; - C++実装では可能な範囲で C++20 を利用する。
; ==============================================================================

[platformio]
; [重要][2026-04-04] 既定 env は開発継続性優先（secure NVS 先行試行 + plaintext fallback 許可）とする。
; [厳守] 最終セキュア確認は `esp32s3_secure_final` を明示指定して実施する。
default_envs = esp32s3_secure

[env]
platform = espressif32@6.12.0
framework = arduino
; [厳守] Arduino-ESP32を 2.0.17 系へ固定化（再現性確保）
platform_packages = platformio/framework-arduinoespressif32@3.20017.0
monitor_speed = 115200
monitor_filters = time

[env:esp32s3_secure]
board = esp32-s3-devkitc-1
; [重要] 実機は 16MB Flash / 8MB PSRAM 構成
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_build.psram = enabled
; [推奨] COM番号固定を避けるため upload_port は未指定（自動検出）
; 必要時のみ `pio run -t upload --upload-port COMx` で明示指定する

; [重要][2026-04-05] `DEV-001` 保全のため元CSVは残し、`DEV-002` 検証では
; `esp32s3_dev002_16MB_candidate_a.csv` を使用する。
board_build.partitions = partitions/esp32s3_dev002_16MB_candidate_a.csv
; [重要] OTA rollback（未確定起動失敗時の旧面復帰）検証のため、sdkconfigを適用する。
board_build.sdkconfig = sdkconfig.defaults
; [重要] 機密設定は LittleFS で読み書きする実装のため、FS種別は littlefs に固定する
board_build.filesystem = littlefs

; [推奨] C++20を有効化（IDF依存により将来調整の可能性あり）
build_flags =
  -std=gnu++2a
  -Iheader
  -I../shared/include
  ; [重要] ESP_LOGD/I/W/E を有効化するためのコンパイル時ログレベル
  -D CORE_DEBUG_LEVEL=5
  -D APP_TARGET_ESP32S3=1
  -D BOARD_HAS_PSRAM
  -D MQTT_TLS_REQUIRED=1
  -D MQTT_AUTH_REQUIRED=1
  -D APP_SECURE_FINAL_BUILD=0
  ; [重要][2026-05-02] 開発/診断ビルドでは高詳細ログと製造系APIを有効化する。
  -D APP_ENABLE_DIAGNOSTIC_LOG=1
  -D APP_ENABLE_FACTORY_APIS=1
  ; [重要][2026-04-04] 開発ビルドは secure NVS を先に試し、失敗時のみ平文 fallback を許可する。
  -D APP_NVS_TRY_SECURE_INIT_FIRST=1
  -D APP_NVS_ALLOW_PLAINTEXT_FALLBACK=1

; [重要] ひな形段階では追加ライブラリを使用しない
lib_deps =
  knolleary/PubSubClient
  marcoschwartz/LiquidCrystal_I2C
  duinoWitchery/hd44780
  adafruit/Adafruit BME280 Library
  adafruit/Adafruit Unified Sensor

[env:esp32s3_secure_final]
board = esp32-s3-devkitc-1
; [重要] 実機は 16MB Flash / 8MB PSRAM 構成
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_build.psram = enabled
; [推奨] COM番号固定を避けるため upload_port は未指定（自動検出）
; 必要時のみ `pio run -t upload --upload-port COMx` で明示指定する

; [重要][2026-04-05] `DEV-002` 検証では最適化CSVを使用する。
board_build.partitions = partitions/esp32s3_dev002_16MB_candidate_a.csv
; [重要] OTA rollback（未確定起動失敗時の旧面復帰）検証のため、sdkconfigを適用する。
board_build.sdkconfig = sdkconfig.defaults
; [重要] 機密設定は LittleFS で読み書きする実装のため、FS種別は littlefs に固定する
board_build.filesystem = littlefs

; [重要][2026-04-04] 最終セキュアビルド。
; secure NVS 初期化を必須とし、plaintext fallback を禁止する。
build_flags =
  -std=gnu++2a
  -Iheader
  -I../shared/include
  -D CORE_DEBUG_LEVEL=5
  -D APP_TARGET_ESP32S3=1
  -D BOARD_HAS_PSRAM
  -D MQTT_TLS_REQUIRED=1
  -D MQTT_AUTH_REQUIRED=1
  -D APP_SECURE_FINAL_BUILD=1
  ; [厳守][2026-05-02] 通常運用FWでは高詳細ログと製造系APIを既定で無効化する。
  -D APP_ENABLE_DIAGNOSTIC_LOG=0
  -D APP_ENABLE_FACTORY_APIS=0
  -D APP_NVS_TRY_SECURE_INIT_FIRST=1
  -D APP_NVS_ALLOW_PLAINTEXT_FALLBACK=0

lib_deps =
  knolleary/PubSubClient
  marcoschwartz/LiquidCrystal_I2C
  duinoWitchery/hd44780
  adafruit/Adafruit BME280 Library
  adafruit/Adafruit Unified Sensor

[env:esp32s3_secure_rescue]
board = esp32-s3-devkitc-1
; [重要] 実機は 16MB Flash / 8MB PSRAM 構成
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_build.psram = enabled
; [推奨] COM番号固定を避けるため upload_port は未指定（自動検出）
; 必要時のみ `pio run -t upload --upload-port COMx` で明示指定する

; [重要][2026-04-05] `DEV-002` 検証では最適化CSVを使用する。
board_build.partitions = partitions/esp32s3_dev002_16MB_candidate_a.csv
; [重要] OTA rollback（未確定起動失敗時の旧面復帰）検証のため、sdkconfigを適用する。
board_build.sdkconfig = sdkconfig.defaults
; [重要] 機密設定は LittleFS で読み書きする実装のため、FS種別は littlefs に固定する
board_build.filesystem = littlefs

; [重要][2026-04-05] 救済専用ビルド。
; secure_final の fail-closed 方針は維持し、復旧時のみ本envでAP保守モードを起動する。
; [厳守] 本envはログ採取/回復操作専用。通常運用や出荷判定には使用しない。
build_flags =
  -std=gnu++2a
  -Iheader
  -I../shared/include
  -D CORE_DEBUG_LEVEL=5
  -D APP_TARGET_ESP32S3=1
  -D BOARD_HAS_PSRAM
  -D MQTT_TLS_REQUIRED=1
  -D MQTT_AUTH_REQUIRED=1
  -D APP_SECURE_FINAL_BUILD=0
  ; [重要][2026-05-02] 救済ビルドは問題解析用のため、診断ログと製造系APIを有効化する。
  -D APP_ENABLE_DIAGNOSTIC_LOG=1
  -D APP_ENABLE_FACTORY_APIS=1
  -D APP_NVS_TRY_SECURE_INIT_FIRST=1
  -D APP_NVS_ALLOW_PLAINTEXT_FALLBACK=1
  -D APP_SECURE_RESCUE_MODE=1

lib_deps =
  knolleary/PubSubClient
  marcoschwartz/LiquidCrystal_I2C
  duinoWitchery/hd44780
  adafruit/Adafruit BME280 Library
  adafruit/Adafruit Unified Sensor

